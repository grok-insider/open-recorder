[package]
name = "ord-core"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "open-recorder capture/encode engine: ring buffer + keyframe-aware clip selection"

[dependencies]
ord-common.workspace = true
thiserror.workspace = true
ffmpeg-next = { version = "8", optional = true }
crossbeam = { version = "0.8", optional = true }
waycap-rs = { git = "https://github.com/0xfell/waycap-rs.git", rev = "b8ed2a0ab7bbd5b5de231205e0fc8210dbec775f", default-features = false, features = ["nvidia", "egl"], optional = true }

[features]
# `mux` pulls in ffmpeg-next (needs the system ffmpeg libs at build time). Off by
# default so the pure logic (ring/clip/engine/backend) builds and tests in CI
# without ffmpeg. The daemon enables it.
#
# `waycap` pulls in waycap-rs (PipeWire DMA-BUF + NVENC) for the real capture
# backend. Needs the GPU/CUDA toolchain; off in CI. Implies `mux`.
default = []
mux = ["dep:ffmpeg-next"]
waycap = ["dep:waycap-rs", "dep:crossbeam", "mux"]
