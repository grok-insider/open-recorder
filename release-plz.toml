# release-plz — the RELEASE half of the pipeline only (config docs:
# https://release-plz.dev/docs/config).
#
# Division of labor:
#   * The "release PR" (version bump + Cargo.lock + CHANGELOG) is produced by
#     OUR OWN `release-pr` job in .github/workflows/release.yml (patch line;
#     deliberate minor/major via manual-version-bump.yml). It is NOT
#     `release-plz release-pr`: that command's git-only change detection runs
#     `cargo package` on the previous tag's worktree, which can never resolve
#     the git-pinned waycap-rs fork against crates.io (upstream
#     release-plz#2651-adjacent).
#   * `release-plz release` (this config) runs on every master push: with
#     `release_always = true` it sees an untagged workspace version and cuts the
#     `vX.Y.Z` tag + GitHub Release from CHANGELOG.md. It never packages, so the
#     fork dependency is irrelevant here.
#
# Every crate shares ONE version via `version.workspace = true` (root Cargo.toml
# `[workspace.package] version`); `ord-cli` (the `ord` binary) is the single
# release unit that emits the tag + Release.
#
# Nothing is published to crates.io. Delivery is:
#   * the GitHub Release — the static `ord` musl binary + the ordd/ord-hud/ord-ui
#     AppImages, attached by .github/workflows/release.yml; and
#   * the grok-insider cachix cache — ci.yml's `build` job pushes the closures on the
#     same master push, and `flake.nix` reads the version from Cargo.toml, so the
#     cached store paths track it as `open-recorder-X.Y.Z`.
#
# NOTE: do NOT set `publish = false` in the Cargo manifests — release-plz skips
# manifest-unpublishable packages' git releases entirely ("nothing to release";
# learned the hard way cutting v0.4.0). The publish guard is the release-plz
# `publish = false` below.

[workspace]
# Not on crates.io: determine the current version from the `v*` git tag instead
# of the cargo registry. Implies no `cargo publish`.
git_only = true
# Never run `cargo publish` (git_only alone doesn't always disable it). Delivery
# is the GitHub Release + cachix, never crates.io.
publish = false
# Release the current workspace version whenever it isn't tagged yet (more robust
# than the PR-merge-only model, and lets a direct version bump cut a release).
release_always = true
# Internal libraries + binaries, not a published crates.io API surface: skip the
# cargo-semver-checks step (it only applies to published libraries anyway).
semver_check = false
# Opt-in model: don't process any crate by default. `ord-cli` opts in below; the
# other six crates ride the shared workspace version with no tag/release of their
# own — there is only one version field, so they all move in lockstep for free.
release = false

[[package]]
name = "ord-cli"
release = true
publish = false
# One workspace-wide tag + release name, e.g. `v0.3.0` (the multi-crate default
# would be `ord-cli-v0.3.0`).
git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"
git_release_enable = true
git_tag_enable = true
# Keep the single curated changelog at the repo root (path is relative to the
# root Cargo.toml, i.e. the repo root in CI).
changelog_path = "CHANGELOG.md"
# open-recorder ships four binaries across seven crates; a change anywhere in the
# workspace ships inside one of them. Fold every other member's commits into
# ord-cli's version bump + changelog, so e.g. an `ord-core` fix or an `ord-ui`
# feature still cuts a release and shows up in the notes.
changelog_include = [
    "ord-common",
    "ord-core",
    "ord-export",
    "ord-daemon",
    "ord-overlay",
    "ord-ui",
]

# Preserve the existing curated changelog header (release-plz would otherwise
# substitute its generic default). New version sections are inserted below this.
[changelog]
header = """# Changelog

All notable changes to open-recorder are recorded here. The format follows
[Keep a Changelog](https://keepachangelog.com/en/1.1.0/); this project uses
[Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
