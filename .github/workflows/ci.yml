name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # PR pushes supersede each other, but master/tag runs must complete: a
  # cancelled master run skips the build→cachix job and leaves that commit's
  # closure uncached (observed when two master merges landed 10 min apart).
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' && !startsWith(github.ref, 'refs/tags/') }}

# Fetching the git-pinned waycap-rs fork + the crates.io index is flaky on
# hosted runners (transient resets/auth hiccups): retry, and use the system
# git CLI for git deps (sturdier than the built-in transport).
env:
  CARGO_NET_RETRY: "10"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  # Fast Rust gate on EVERY push/PR: no GPU, no nix, default (pure) features.
  # The per-iteration check.
  rust:
    name: fmt + clippy + test (default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  # The Cargo.toml `rust-version` claim (1.87) is only honest if something
  # checks it: a dependency bump or new std API can silently raise the real
  # floor. `cargo check` on the pinned MSRV toolchain catches that.
  msrv:
    name: cargo check (MSRV 1.87)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.87
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv
      - run: cargo check --workspace

  # Protect the v0.3.0 cross-platform guarantee: the workspace must keep
  # *compiling* off-Linux with the mock backend (transport seam, dirs paths,
  # cfg-gating). `cargo check` doesn't link, so no mingw/apple toolchain is
  # needed — this catches unix-only API usage leaking into shared code, which
  # the Linux-only jobs can never see.
  cross-check:
    name: cargo check (windows + macos targets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu, aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cross-check
      - run: cargo check --workspace --target x86_64-pc-windows-gnu
      - run: cargo check --workspace --target aarch64-apple-darwin

  # The product's real code is feature-gated (waycap/mux/layershell/gui) and the
  # default Rust job never compiles it. This nix lane builds + lints + tests ALL
  # features in the devshell (ffmpeg/wayland/cuda toolchain), so the muxer +
  # mux_golden tests, the HUD renderer, and the egui UI can't silently rot. No
  # GPU is needed to compile or to run the non-`#[ignore]` tests. Also evaluates
  # the flake (HM module, packages, outputHashes) so breakage surfaces on PRs,
  # not only at release. Runs on every push/PR.
  nix-checks:
    name: nix --all-features + flake eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      # Pull build deps (CUDA/ffmpeg) from cache; no auth token needed for reads,
      # so this works on PRs from forks too.
      - name: Set up Cachix (pull)
        uses: cachix/cachix-action@v15
        with:
          name: grok-insider
          extraPullNames: nix-community
      - name: Evaluate the flake (no build)
        run: nix flake check --no-build -L
      - name: clippy --all-features (devshell)
        run: nix develop -c cargo clippy --workspace --all-targets --all-features -- -D warnings
      # Tests run with every feature EXCEPT `waycap`: the waycap/cust build
      # dynamically links libcuda.so.1, so while it *compiles* without a GPU
      # (clippy above covers it), the resulting test binaries cannot even load
      # on a driverless runner. The waycap test lane runs on the dev box
      # (`cargo test --features waycap -- --ignored`, per AGENTS.md).
      - name: test all features except waycap (devshell)
        run: nix develop -c cargo test --workspace --features "ord-core/mux,ord-daemon/mux,ord-overlay/layershell,ord-overlay/pressed-keys,ord-ui/gui"

  # The nix build + cachix push runs on every master push (plus tags and manual
  # dispatch), so the cache always holds the current master closure and NixOS
  # consumers pointing at github:grok-insider/open-recorder pull instead of compiling.
  # PRs never publish (no secrets on fork PRs anyway).
  #
  # Cachix lives HERE, not in release.yml, by design: release-plz cuts the tag +
  # GitHub Release (and attaches the static `ord` + the AppImages), while this job
  # — on the same release-PR-merge push — caches `open-recorder-X.Y.Z`. The
  # AppImage lane in release.yml then substitutes that closure instead of
  # rebuilding it.
  build:
    name: build + cache (x86_64-linux)
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # Configures the grok-insider cache as a substituter AND pushes every newly
      # built store path to it (using the CACHIX_AUTH_TOKEN secret). nix-community
      # is pulled so CUDA/ffmpeg build deps come from cache. With this, NixOS
      # users who add the grok-insider substituter never compile open-recorder.
      - name: Set up Cachix
        uses: cachix/cachix-action@v15
        with:
          name: grok-insider
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community

      # Build every published binary so all closures land in the cache:
      #   ord (CLI), ordd (NVENC daemon), ord-hud (layer-shell HUD),
      #   ord-ui (egui library), and the bundled default.
      # No `nix flake check` here: the nix-checks job already evaluated the
      # flake on this same push, and the package builds above are the real
      # signal — re-running the full check only duplicated work.
      - name: Build all packages
        run: |
          nix build .#ord-cli -L
          nix build .#ordd -L
          nix build .#ord-hud -L
          nix build .#ord-ui -L
          nix build .#default -L
