name: Release

# Automated patch-line versioning + GitHub Releases. Deliberate major/minor
# milestones go through the Manual Version Bump workflow (open-media's model).
#
# Flow on every push to master:
#   * release-pr          — OUR OWN job (not release-plz): opens/updates the
#                           "release PR" that bumps the single
#                           [workspace.package].version to the next PATCH
#                           (x.y.z -> x.y.z+1), refreshes Cargo.lock, and writes
#                           the CHANGELOG section via the AI changelog action.
#                           Only feat/fix commits since the last tag trigger it.
#   * release-plz-release — when a release PR (auto or manual) is merged,
#                           creates the `vX.Y.Z` tag + GitHub Release from the
#                           changelog (release-plz, release_always = true).
#   * upload-ord          — builds the portable static `ord` client and attaches it.
#   * upload-appimages    — bundles ordd/ord-hud/ord-ui as AppImages (via the Nix
#                           flake) and attaches them, for non-Nix Linux users.
#
# Why the release PR is hand-rolled: `release-plz release-pr` in git-only mode
# reconstructs the last tag's worktree and runs `cargo package` on it, which can
# never resolve the git-pinned waycap-rs fork against crates.io (upstream
# release-plz#2651-adjacent; open-media hit the same wall and only escaped by
# publishing its git dep to crates.io — not an option for a fork of someone
# else's crate). The `release-plz release` step never packages, so it stays.
#
# Cachix is intentionally NOT handled here: ci.yml's `build` job runs on the same
# master push and pushes the closures to grok-insider.cachix.org (flake.nix reads the
# version straight from Cargo.toml). Nothing is published to crates.io — see the
# `git_only` setting in release-plz.toml.

on:
  push:
    branches: [master]
  # Manual test/kick handle for the release-pr job. `force` bypasses the
  # feat/fix filter so the flow can be exercised end-to-end on demand.
  workflow_dispatch:
    inputs:
      force:
        description: Open the release PR even without feat/fix commits
        required: false
        type: boolean
        default: false

# Least privilege by default; each job elevates only what it needs.
permissions:
  contents: read

jobs:
  # Keep the patch-line release PR up to date on every push. Merging that PR is
  # what later triggers the `release` job (via the resulting push to master).
  release-pr:
    name: release PR (patch line)
    if: github.repository_owner == 'grok-insider'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-pr
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
      CARGO_NET_RETRY: "10"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT so pushes to the release branch trigger required CI (a
          # GITHUB_TOKEN-pushed branch doesn't).
          persist-credentials: true
          token: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Decide whether a release PR is due. Both races with the sibling
      # `release-plz-release` job are safe: if the current version is untagged,
      # this push IS the release (skip); once it's tagged, the commit range
      # v<current>..HEAD is empty, so the feat/fix filter skips too.
      - name: Decide the next version
        id: decide
        env:
          FORCE: ${{ inputs.force == true && 'true' || 'false' }}
        run: |
          set -euo pipefail
          current="$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f2)"
          if [[ ! "$current" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::Cargo.toml workspace version '$current' is not x.y.z."
            exit 1
          fi
          major="${BASH_REMATCH[1]}" minor="${BASH_REMATCH[2]}" patch="${BASH_REMATCH[3]}"
          if ! git rev-parse -q --verify "refs/tags/v${current}" >/dev/null; then
            echo "::notice::v${current} is not tagged yet — this push is releasing it; no new release PR."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Only user-facing changes (feat/fix) warrant a release; chore/docs/ci
          # pushes still ride into the next release's notes via the commit range.
          if [ "$FORCE" != "true" ] \
            && ! git log "v${current}..HEAD" --no-merges --format=%s \
               | grep -qE '^(feat|fix)(\(.*\))?!?:'; then
            echo "::notice::no feat/fix commits since v${current}; nothing to release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # The automatic stream stays on the patch line (z+1). Breaking commits
          # are only flagged in the PR body: deliberate minor/major milestones go
          # through the Manual Version Bump workflow.
          breaking=false
          if git log "v${current}..HEAD" --no-merges --format='%s%n%b' \
            | grep -qE '^[a-z]+(\(.*\))?!:|^BREAKING CHANGE'; then
            breaking=true
          fi
          next="${major}.${minor}.$(( patch + 1 ))"
          {
            echo "skip=false"
            echo "current=$current"
            echo "next=$next"
            echo "breaking=$breaking"
          } >> "$GITHUB_OUTPUT"

      - name: Bump the workspace version
        if: ${{ steps.decide.outputs.skip == 'false' }}
        env:
          NEXT: ${{ steps.decide.outputs.next }}
        run: |
          set -euo pipefail
          sed -i -E "0,/^version = \"[^\"]+\"/s//version = \"${NEXT}\"/" Cargo.toml
          sed -i -E "s|(ord-[a-z-]+ = \{ path = \"crates/ord-[a-z-]+\", version = \")[^\"]+(\" \})|\1${NEXT}\2|g" Cargo.toml
          cargo update --workspace
          if git diff --quiet -- Cargo.toml Cargo.lock; then
            echo "::error::Version bump produced no Cargo.toml or Cargo.lock changes."
            exit 1
          fi

      - name: Generate the AI changelog section
        if: ${{ steps.decide.outputs.skip == 'false' }}
        uses: grok-insider/release-changelog-action@v1
        with:
          version: ${{ steps.decide.outputs.next }}
          range: v${{ steps.decide.outputs.current }}..HEAD
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          project-description: "Linux screen/game recorder with NVENC, overlay HUD and daemon (ord + ordd + ord-hud + ord-ui)"
      # The AI action has emitted a bare `## 0.3.0` heading before; force the
      # Keep-a-Changelog form.
      - name: Normalize the changelog heading (Keep a Changelog)
        if: ${{ steps.decide.outputs.skip == 'false' }}
        env:
          NEXT: ${{ steps.decide.outputs.next }}
        run: |
          set -euo pipefail
          sed -i -E "0,/^##[[:space:]]+\[?${NEXT}\]?([[:space:]].*)?$/s//## [${NEXT}] - $(date -u +%F)/" CHANGELOG.md

      - name: Open or update the release PR
        if: ${{ steps.decide.outputs.skip == 'false' }}
        env:
          CURRENT: ${{ steps.decide.outputs.current }}
          NEXT: ${{ steps.decide.outputs.next }}
          BREAKING: ${{ steps.decide.outputs.breaking }}
        run: |
          set -euo pipefail
          branch="release-plz-v${NEXT}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add Cargo.toml Cargo.lock CHANGELOG.md
          git commit -m "chore: release v${NEXT}"
          # Regenerated from master on every push, so the PR always covers the
          # full v${CURRENT}..HEAD range.
          git push --force --set-upstream origin "$branch"

          gh label create release --color 0e8a16 \
            --description "release PRs (auto patch line + manual bumps)" \
            2>/dev/null || true

          body="$(mktemp)"
          {
            echo "Automated patch-line release PR: **v${CURRENT} -> v${NEXT}**."
            echo
            echo "Bumps the single workspace version + \`Cargo.lock\`, and adds the"
            echo "AI-generated \`CHANGELOG.md\` section for the commits since v${CURRENT}."
            echo "Regenerated from master on every push until merged."
            echo
            if [ "$BREAKING" = "true" ]; then
              echo "**WARNING: breaking commits (\`!\`/\`BREAKING CHANGE\`) landed since"
              echo "v${CURRENT}.** The automatic stream still bumps the patch component;"
              echo "if this deserves a minor milestone instead, close this PR and run the"
              echo "Manual Version Bump workflow."
              echo
            fi
            echo "Merging tags \`v${NEXT}\` + creates the GitHub Release (release-plz"
            echo "\`release_always\`), attaches the static \`ord\` + AppImages, and pushes"
            echo "the closures to cachix."
          } > "$body"

          existing="$(gh pr list --state open --head "$branch" --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --title "chore: release v${NEXT}" --body-file "$body"
          else
            gh pr create \
              --base master \
              --head "$branch" \
              --title "chore: release v${NEXT}" \
              --body-file "$body" \
              --label release
          fi

          # A stale release PR for a superseded version (e.g. a manual minor bump
          # landed in between) must not linger as a second open release path.
          for stale in $(gh pr list --state open --label release --json number,headRefName \
            --jq ".[] | select(.headRefName != \"$branch\" and (.headRefName | startswith(\"release-plz-v\"))) | .number"); do
            gh pr close "$stale" --comment "Superseded by the release PR for v${NEXT}." --delete-branch
          done

  # On a release-PR merge: create the `vX.Y.Z` tag + GitHub Release. Exposes
  # whether a release was cut (and its tag/version) to the artifact jobs below.
  release-plz-release:
    name: release-plz release
    if: github.repository_owner == 'grok-insider'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Two rapid master pushes must not race the tag/Release creation.
    concurrency:
      group: release-plz-release
      cancel-in-progress: false
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      releases: ${{ steps.release-plz.outputs.releases }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz (release)
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

  # Build a portable, statically-linked `ord` (x86_64 musl) and attach it to the
  # just-created GitHub Release. `ord` is the thin control client compositor
  # keybinds invoke on every keypress; it must be on PATH and start instantly, so
  # it ships as a tiny static binary, NOT an AppImage.
  #
  # `ord` is pure Rust (ord-cli -> ord-export -> ord-common; serde/bincode/toml,
  # no ffmpeg/C), so a plain musl target build is fully static — no zig/cmake.
  # This job is independent: if it fails, the tag/Release/changelog/cachix are
  # already done and it can be re-run.
  upload-ord:
    name: attach ord client (x86_64-musl static)
    needs: release-plz-release
    if: needs.release-plz-release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TARGET: x86_64-unknown-linux-musl
    steps:
      - name: Resolve release tag/version
        id: rel
        env:
          RELEASES: ${{ needs.release-plz-release.outputs.releases }}
        run: |
          set -euo pipefail
          echo "tag=$(echo "$RELEASES" | jq -r '.[0].tag')" >> "$GITHUB_OUTPUT"
          echo "version=$(echo "$RELEASES" | jq -r '.[0].version')" >> "$GITHUB_OUTPUT"
      - name: Checkout the released tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.rel.outputs.tag }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ env.TARGET }}
      - name: Build static ord
        run: cargo build --release -p ord-cli --target "$TARGET"
      - name: Verify the binary is static
        run: |
          set -euo pipefail
          bin="target/$TARGET/release/ord"
          file "$bin"
          # A static binary makes `ldd` print "not a dynamic executable"; any
          # glibc NEEDED entry means the build silently linked dynamically.
          if ldd "$bin" 2>&1 | grep -qiE 'libc\.so|GLIBC'; then
            echo "::error::ord is dynamically linked against glibc"; exit 1
          fi
      - name: Package tarball + checksum
        id: pkg
        env:
          VERSION: ${{ steps.rel.outputs.version }}
        run: |
          set -euo pipefail
          archive="ord-${VERSION}-x86_64-linux-musl.tar.gz"
          tar -czf "$archive" -C "target/$TARGET/release" ord
          sha256sum "$archive" > "$archive.sha256"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
      - name: Upload to the GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.rel.outputs.tag }}
          ARCHIVE: ${{ steps.pkg.outputs.archive }}
        run: gh release upload "$TAG" "$ARCHIVE" "$ARCHIVE.sha256" --clobber

  # Bundle the native binaries (ordd, ord-hud, ord-ui) as AppImages straight from
  # the Nix flake and attach them, so non-NixOS Linux users run the full recorder
  # without compiling ffmpeg/CUDA/waycap-rs. nix-appimage packages the already
  # built closure; with Cachix configured it substitutes the build that ci.yml's
  # `build` job pushes on the SAME master push (no recompile in the common case;
  # worst case this job realizes the closure itself, which still works).
  #
  # The flake's runtime wrapper resolves the NVIDIA driver libs (libcuda.so.1,
  # libnvidia-encode.so.1) from /run/opengl-driver/lib (NixOS) AND the FHS driver
  # dirs (foreign distros) — see flake.nix postFixup — so NVENC works inside the
  # AppImage on any distro with the proprietary driver installed.
  upload-appimages:
    name: attach AppImages (ordd, ord-hud, ord-ui)
    needs: release-plz-release
    if: needs.release-plz-release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve release tag/version
        id: rel
        env:
          RELEASES: ${{ needs.release-plz-release.outputs.releases }}
        run: |
          set -euo pipefail
          echo "tag=$(echo "$RELEASES" | jq -r '.[0].tag')" >> "$GITHUB_OUTPUT"
          echo "version=$(echo "$RELEASES" | jq -r '.[0].version')" >> "$GITHUB_OUTPUT"
      - name: Checkout the released tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.rel.outputs.tag }}
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      # Substitute the prebuilt closure from the grok-insider cache (and push any newly
      # realized paths — e.g. the AppImage runtime — back with the auth token).
      - name: Set up Cachix
        uses: cachix/cachix-action@v15
        with:
          name: grok-insider
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community
      - name: Build AppImages
        run: |
          set -euo pipefail
          for pkg in ordd ord-hud ord-ui; do
            nix bundle --bundler github:ralismark/nix-appimage \
              ".#${pkg}" --out-link "${pkg}.AppImage"
          done
      - name: Package + checksums
        env:
          VERSION: ${{ steps.rel.outputs.version }}
        run: |
          set -euo pipefail
          for pkg in ordd ord-hud ord-ui; do
            asset="${pkg}-${VERSION}-x86_64.AppImage"
            install -m755 "$(readlink -f "${pkg}.AppImage")" "$asset"
            sha256sum "$asset" > "$asset.sha256"
          done
      - name: Upload to the GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.rel.outputs.tag }}
        run: gh release upload "$TAG" ./*-x86_64.AppImage ./*-x86_64.AppImage.sha256 --clobber
